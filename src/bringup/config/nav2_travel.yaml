      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True




behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0 # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 已调整为 1.0 弧度/秒，和 controller_server 中的 max_vel_theta 保持一致
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.5 # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 已调整为 3.5 弧度/秒，和 controller_server 中的 acc_lim_theta 保持一致




robot_state_publisher:
  ros__parameters:
    use_sim_time: False




waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200




# =====================================================
# 速度平滑器配置
# =====================================================
# velocity_smoother 负责平滑速度指令，避免突变造成机器人抖动或打滑
velocity_smoother:
  ros__parameters:
    # 是否使用仿真时间：False 表示使用真实系统时间
    use_sim_time: False
    # 平滑处理频率（Hz）：20Hz 提供足够的控制精度，平衡响应性和计算负担
    smoothing_frequency: 20.0
    # 是否缩放速度：False 表示不进行速度归一化处理
    scale_velocities: False
    # 反馈模式：OPEN_LOOP 表示开环控制，不使用里程计反馈
    feedback: "OPEN_LOOP" # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 改动成 OPEN_LOOP 模式，暂时不开启闭环控制模式
    # 最大速度限制 [x, y, theta]（米/秒，米/秒，弧度/秒）：限制输出速度的上限
    max_velocity: [0.5, 0.0, 1.0] # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 首个参数已调整为 0.5 米/秒，和 controller_server 中的 max_vel_x 保持一致
    # 最小速度限制 [x, y, theta]（米/秒，米/秒，弧度/秒）：限制输出速度的下限，负值表示可后退
    min_velocity: [0.0, 0.0, -1.0] # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 首个参数已调整为 -0.0 米/秒，与 controller_server 中的 min_vel_x 保持一致，允许以相同速度倒退
    # 最大加速度限制 [x, y, theta]（米/秒²，米/秒²，弧度/秒²）：限制速度变化率，避免急加速
    max_accel: [3.0, 0.0, 3.5] # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 同步 control_server 中的设置，已调整为 [3.0, 0.0, 3.5]，略微提高加速响应速度
    # 最大减速度限制 [x, y, theta]（米/秒²，米/秒²，弧度/秒²）：限制刹车速率，避免急停
    max_decel: [-3.0, 0.0, -3.5] # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 同步 control_server 中的设置，已调整为 [-3.0, 0.0, -3.5]，略微提高减速响应速度
    # 里程计话题：订阅的里程计数据源，用于闭环反馈（当 feedback 为 CLOSED_LOOP 时使用）
    # 当前为 OPEN_LOOP 模式，此参数不生效
    odom_topic: "odom_CBoar" # >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> 配置为底层 C 板的里程计数据
    # 里程计数据有效时长（秒）：超过 0.1 秒的里程计数据视为过期
    odom_duration: 0.1
    # 死区速度 [x, y, theta]（米/秒，米/秒，弧度/秒）：低于此值的速度指令会被置零，避免微小抖动
    deadband_velocity: [0.0, 0.0, 0.0]
    # 速度指令超时时间（秒）：超过 1.0 秒未收到新指令则停止输出，防止失控
    velocity_timeout: 1.0