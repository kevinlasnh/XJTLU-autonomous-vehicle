# Nav2 基线参数；保留默认口径，派生配置请复制后再调参数值。
# 本次仅统一注释和排版；不在此文件中改动任何参数值。

# AMCL 定位参数；影响静态地图定位收敛和粒子滤波稳定性。
amcl:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# AMCL 运动模型噪声；影响里程计误差在粒子滤波中的传播。
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
# AMCL 关键坐标系；应与整车 TF 定义保持一致。
    base_frame_id: "base_footprint"
# Beam skip 参数；用于处理激光异常点和遮挡。
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
# 激光测量模型；影响短量测和命中概率分布。
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
# 粒子滤波规模；调大更稳但算力和延迟都会上升。
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
# 粒子滤波收敛阈值；影响采样数量自适应。
    pf_err: 0.05
    pf_z: 0.99
# 恢复项参数；用于粒子集退化时的再注入策略。
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
# 激光命中模型；影响匹配时对测量误差的容忍度。
    sigma_hit: 0.2
    tf_broadcast: true
# TF 容忍时间；调大更宽松，调小更严格。
    transform_tolerance: 1.0
# 更新触发阈值；控制机器人移动多大后才重新更新定位。
    update_min_a: 0.2
    update_min_d: 0.25
# 测量模型权重；决定命中、随机和短量测的相对占比。
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan

# 行为树导航器；负责组织规划、控制和恢复动作。
bt_navigator:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 导航关键坐标系；应与 map 和 base_link 相关 TF 保持一致。
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
# 行为树循环周期；调小响应更快，但 CPU 开销更高。
    bt_loop_duration: 10
# 动作和服务默认超时；过小会导致慢节点被误判失败。
    default_server_timeout: 20
    wait_for_service_timeout: 1000
# 行为树插件列表；缺项会导致导航树节点无法加载。
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# 行为树 Through Poses 辅助节点；保持基础 ROS 参数一致。
bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true

# 行为树 To Pose 辅助节点；保持基础 ROS 参数一致。
bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true

# 控制器服务；影响局部跟踪、速度约束和到点判定。
controller_server:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 控制循环频率；调大响应更快，但控制线程负载更高。
    controller_frequency: 20.0
# 速度阈值；用于过滤过小指令，避免抖动。
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
# 控制失败容忍度；调大更宽松，调小更严格。
    failure_tolerance: 0.3
# 进度检查器入口；用于判断机器人是否卡住。
    progress_checker_plugin: "progress_checker"
# 目标检查器列表；控制到点和到向判定逻辑。
    goal_checker_plugins: ["general_goal_checker"]
# 局部控制器列表；当前主线使用 DWB 跟踪。
    controller_plugins: ["FollowPath"]
# 前进度检查器；用于限制长时间不动的情况。
    progress_checker:
# 进度检查器插件；保持与当前 Nav2 版本一致。
      plugin: "nav2_controller::SimpleProgressChecker"
# 最小有效移动半径；低于该位移会被视为原地停滞。
      required_movement_radius: 0.5
# 移动超时时间；调大更宽松，调小更容易触发卡住。
      movement_time_allowance: 10.0
# 目标检查器；控制位置和朝向容差。
    general_goal_checker:
# 是否保留目标检查状态；开启后更利于连续导航。
      stateful: true
# 目标检查器插件；保持与当前 Nav2 版本一致。
      plugin: "nav2_controller::SimpleGoalChecker"
# 位置到点容差；调大更宽松，调小更严格。
      xy_goal_tolerance: 0.25
# 朝向到点容差；调大更宽松，调小更严格。
      yaw_goal_tolerance: 0.25
# DWB 局部规划器；影响速度采样、轨迹评估和避障策略。
    FollowPath:
# DWB 插件实现；保持与当前 Nav2 控制栈一致。
      plugin: "dwb_core::DWBLocalPlanner"
# 是否输出轨迹调试信息；打开更利于诊断但日志更多。
      debug_trajectory_details: true
# 速度上下界；直接限制控制器可采样的线速度范围。
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.26
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0
# 加减速度限制；影响起步、刹车和转向响应。
      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
# 速度采样数量；调大更细但计算更重。
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
# 前向仿真时长；调大更有前瞻性但也更保守。
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
# DWB 使用的 TF 容忍时间；过小更容易因 TF 抖动失败。
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
# 轨迹评分器列表；顺序和组合会影响控制行为。
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
# 障碍物代价权重；调大更保守，调小更激进。
      BaseObstacle.scale: 0.02
# 路径贴合权重；调大更强调沿全局路径行驶。
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
# 朝向对齐权重；调大更强调车头朝向目标。
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
# 路径距离权重；调大更不容易偏离规划路径。
      PathDist.scale: 32.0
# 目标距离权重；调大更积极靠近目标点。
      GoalDist.scale: 24.0
# 到点转向权重；调大更强调先对正再结束。
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# 局部代价地图；供近场避障和局部控制使用。
local_costmap:
  local_costmap:
    ros__parameters:
# 代价地图更新频率；调大刷新更快但 CPU 开销更高。
      update_frequency: 5.0
      publish_frequency: 2.0
# 局部规划参考坐标系；应与下游控制和 TF 链保持一致。
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
# 滚动窗口开关；开启后地图会跟随机器人移动。
      rolling_window: true
# 地图尺寸；调大覆盖更广，但内存和更新开销都会增加。
      width: 3
      height: 3
# 地图分辨率；调小更细致，调大更省内存。
      resolution: 0.05
# 机器人安全半径；直接影响碰撞检测和膨胀结果。
      robot_radius: 0.22
# 代价地图插件列表；决定当前地图叠加哪些层。
      plugins: ["voxel_layer", "inflation_layer"]
# 膨胀层；负责给障碍物预留安全边界。
      inflation_layer:
# 膨胀层插件；保持与当前 Nav2 版本一致。
        plugin: "nav2_costmap_2d::InflationLayer"
# 代价衰减系数；调大衰减更快，调小更保守。
        cost_scaling_factor: 3.0
# 膨胀半径；应与机器人半径和安全裕量匹配。
        inflation_radius: 0.55
# 体素层；将 LaserScan 观测写入三维体素后投影到二维。
      voxel_layer:
# 体素层插件；保持与当前 Nav2 版本一致。
        plugin: "nav2_costmap_2d::VoxelLayer"
# 体素层启用开关；关闭后局部障碍将不再写入地图。
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
# 观测源列表；应与下方传感器配置名称对应。
        observation_sources: scan
# LaserScan 观测配置；负责把 /scan 写入局部地图。
        scan:
# 输入话题；改错会导致局部代价地图收不到激光数据。
          topic: /scan
# 高度过滤阈值；用于剔除过高障碍。
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
# 清障光线追踪距离；调大可清更远，但计算更重。
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
# 障碍物标记距离；调大覆盖更远但噪点更多。
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
# 静态层；用于加载地图服务器提供的静态障碍。
      static_layer:
# 静态层插件；用于订阅静态地图。
        plugin: "nav2_costmap_2d::StaticLayer"
# 地图 QoS 设置；保持 true 可接收延迟到达的地图。
        map_subscribe_transient_local: true
# 是否总是发送完整代价地图；开启更稳但带宽更高。
      always_send_full_costmap: true

# 全局代价地图；供全局规划和大范围障碍表达使用。
global_costmap:
  global_costmap:
    ros__parameters:
# 代价地图更新频率；调大刷新更快但 CPU 开销更高。
      update_frequency: 1.0
      publish_frequency: 1.0
# 全局规划参考坐标系；通常保持 map。
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
# 机器人安全半径；应与局部代价地图保持一致。
      robot_radius: 0.22
# 地图分辨率；调小更细致，调大更省内存。
      resolution: 0.05
# 是否记录未知区域；会直接影响全局路径是否可穿越未知空间。
      track_unknown_space: true
# 代价地图插件列表；决定当前地图叠加哪些层。
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
# 障碍物层；将传感器观测直接写入全局代价地图。
      obstacle_layer:
# 障碍物层插件；保持与当前 Nav2 版本一致。
        plugin: "nav2_costmap_2d::ObstacleLayer"
# 障碍物层启用开关；关闭后动态障碍不会进入全局地图。
        enabled: true
# 观测源列表；应与下方传感器配置名称对应。
        observation_sources: scan
# LaserScan 观测配置；负责把 /scan 写入全局地图。
        scan:
# 输入话题；改错会导致全局代价地图收不到激光数据。
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
# 清障光线追踪距离；调大可清更远，但计算更重。
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
# 障碍物标记距离；调大覆盖更远但噪点更多。
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
# 静态层；用于加载地图服务器提供的静态障碍。
      static_layer:
# 静态层插件；用于订阅静态地图。
        plugin: "nav2_costmap_2d::StaticLayer"
# 地图 QoS 设置；保持 true 可接收延迟到达的地图。
        map_subscribe_transient_local: true
# 膨胀层；负责给障碍物预留安全边界。
      inflation_layer:
# 膨胀层插件；保持与当前 Nav2 版本一致。
        plugin: "nav2_costmap_2d::InflationLayer"
# 代价衰减系数；调大衰减更快，调小更保守。
        cost_scaling_factor: 3.0
# 膨胀半径；应与机器人半径和安全裕量匹配。
        inflation_radius: 0.55
# 是否总是发送完整代价地图；开启更稳但带宽更高。
      always_send_full_costmap: true

# 地图服务；负责加载静态地图文件。
map_server:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 地图文件路径；通常由 launch 层在运行时覆盖。
    yaml_filename: ""

# 地图保存服务；用于导出当前地图。
map_saver:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 地图保存超时；调大可容纳更慢的磁盘写入。
    save_map_timeout: 5.0
# 空闲栅格阈值；影响导出地图时的空白判定。
    free_thresh_default: 0.25
# 占用栅格阈值；影响导出地图时的障碍判定。
    occupied_thresh_default: 0.65
# 地图 QoS 设置；保持 true 可接收延迟到达的地图。
    map_subscribe_transient_local: true

# 全局规划服务；负责生成从起点到目标点的全局路径。
planner_server:
  ros__parameters:
# 规划频率期望值；用于监控规划线程是否掉速。
    expected_planner_frequency: 20.0
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 规划器列表；当前主线使用 NavFn 规划。
    planner_plugins: ["GridBased"]
# 全局规划器参数；影响路径生成策略。
    GridBased:
# 规划器插件；保持与当前 Nav2 版本一致。
      plugin: "nav2_navfn_planner/NavfnPlanner"
# 目标容忍半径；调大更宽松，调小更严格。
      tolerance: 0.5
# 是否启用 A*；关闭时使用 NavFn 默认搜索策略。
      use_astar: false
# 是否允许穿越未知区域；会直接影响全局路径可达性。
      allow_unknown: true

# 路径平滑服务；用于优化规划路径的可执行性。
smoother_server:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 平滑器列表；决定路径后处理策略。
    smoother_plugins: ["simple_smoother"]
# Simple Smoother 参数；影响路径平滑程度和迭代次数。
    simple_smoother:
# 平滑器插件；保持与当前 Nav2 版本一致。
      plugin: "nav2_smoother::SimpleSmoother"
# 平滑收敛阈值；调小更严格，调大更快停止。
      tolerance: 1.0e-10
# 最大迭代次数；调大更充分但耗时更长。
      max_its: 1000
# 是否做细化；开启后路径更平滑但计算更重。
      do_refinement: true

# 恢复行为服务；负责原地转向、后退和等待等动作。
behavior_server:
  ros__parameters:
# 恢复行为使用的代价地图输入；改错会导致行为节点拿不到环境信息。
    costmap_topic: local_costmap/costmap_raw
# 恢复行为使用的足迹输入；改错会导致碰撞检查失真。
    footprint_topic: local_costmap/published_footprint
# 恢复行为循环频率；调大响应更快但 CPU 开销更高。
    cycle_frequency: 10.0
# 恢复行为列表；决定可用的恢复动作集合。
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
# 原地转向行为；用于狭窄区域重新定向。
    spin:
      plugin: "nav2_behaviors/Spin"
# 后退行为；用于脱离局部卡死。
    backup:
      plugin: "nav2_behaviors/BackUp"
# 定向直行行为；用于短距离脱困。
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
# 等待行为；用于短时阻塞场景。
    wait:
      plugin: "nav2_behaviors/Wait"
# 辅助遥控行为；用于人工接管下的安全移动。
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
# 恢复行为参考坐标系；应与局部控制链保持一致。
    global_frame: odom
    robot_base_frame: base_link
# TF 容忍时间；调大更宽松，调小更严格。
    transform_tolerance: 0.1
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 前向模拟时长；影响恢复动作的碰撞预判。
    simulate_ahead_time: 2.0
# 恢复动作最大角速度；调大转向更快但也更激进。
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
# 恢复动作角加速度；调大响应更快但也更激进。
    rotational_acc_lim: 3.2

# 机器人状态发布器；保持基础 URDF 和 TF 参数一致。
robot_state_publisher:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true

# 航点跟随器；控制多目标点任务的执行策略。
waypoint_follower:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 航点执行循环频率；调大响应更快但线程负载更高。
    loop_rate: 20
# 失败即停开关；开启后任一航点失败都会中断任务。
    stop_on_failure: false
# 航点任务执行器入口；决定到点后的附加动作。
    waypoint_task_executor_plugin: "wait_at_waypoint"
# 到点等待任务；用于在每个航点执行固定停留。
    wait_at_waypoint:
# 航点任务插件；保持与当前 Nav2 版本一致。
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
# 是否启用到点等待；关闭后到点立即继续下一个航点。
      enabled: true
# 到点等待时长；调大可留更多稳定时间。
      waypoint_pause_duration: 200

# 速度平滑器；用于限制速度突变并降低控制抖动。
velocity_smoother:
  ros__parameters:
# 是否使用仿真时间；实车环境通常保持 false。
    use_sim_time: true
# 速度平滑频率；调大响应更快但输出更敏感。
    smoothing_frequency: 20.0
# 是否缩放速度向量；开启后会按比例压缩三轴指令。
    scale_velocities: false
# 反馈模式；决定开环还是闭环平滑。
    feedback: "OPEN_LOOP"
# 速度上限；应与控制器输出能力保持一致。
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
# 加速度上限；用于限制速度变化斜率。
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
# 反馈里程计话题；仅在闭环模式下真正使用。
    odom_topic: "odom"
# 里程计有效时长；过期反馈会被视为无效。
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
# 速度指令超时；超时后会输出停车指令。
    velocity_timeout: 1.0
